name: Nextcloud app setup

on:
  push:
    paths:
      - '**setup-nextcloud-app**'
      - 'package.json'
      - 'package-lock.json'
      - 'node_modules/**'
  pull_request:
      paths:
      - '**setup-nextcloud-app**'
      - 'package.json'
      - 'package-lock.json'
      - 'node_modules/**'

permissions: {}

jobs:
  setup-nextcloud-app:
    runs-on: ubuntu-latest
    env:
      FILENAME: ".revision"
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.4'

      - name: Server setup
        uses: ./setup-nextcloud/
        with:
          version: 'stable31'
          database-type: 'sqlite'

      - name: Test setup
        run: |
          mkdir appinfo && 
          curl https://raw.githubusercontent.com/nextcloud/app-tutorial/HEAD/appinfo/info.xml -o appinfo/info.xml

      - name: Script test
        uses: ./setup-nextcloud-app/
        with:
          app: 'notestutorial'
          check-code: false
          force: true

      - name: Test setup
        run: cd ../server && ./occ app:list | grep notestutorial
